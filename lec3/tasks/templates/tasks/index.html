{% extends "tasks/layout.html" %}

{% block body%}
    <h1>Tasks</h1>
    <ul>
        {% for task in tasks %}
            <li>{{ task }}</li>
        {% empty %}
            <li>No tasks.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'tasks:add' %}">Add a New Task</a> 
    <!-- we could refer the add route by url 'add' because we named the add route as 'add' in urls.py -->
{% endblock %}
